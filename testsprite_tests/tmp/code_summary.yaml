version: "2"
type: backend
tech_stack:
  - language: TypeScript
  - framework: Nuxt 3 (H3 server)
  - database: PostgreSQL via Drizzle ORM
  - auth: InsForge (Supabase-compatible)
  - other: Anthropic Claude AI, Google Generative AI, drizzle-kit
features:
  - name: Authentication
    description: Login/logout and session management via InsForge; session cookie set on success
    files:
      - server/api/auth/login.post.ts
      - server/api/auth/logout.post.ts
      - server/api/auth/check.get.ts
      - server/api/auth/delete-account.post.ts
    endpoints:
      - method: POST
        path: /api/auth/login
        description: Authenticate user with email/password, set session cookie
        auth_required: false
        request_schema:
          body:
            email: string
            password: string
        response_schema:
          "200": "{ok: true, provider: string}"
          "400": Missing email or password
          "401": Invalid credentials
      - method: POST
        path: /api/auth/logout
        description: Clear session cookie and sign out
        auth_required: false
        response_schema:
          "200": "{ok: true}"
      - method: GET
        path: /api/auth/check
        description: Check if the current session is authenticated
        auth_required: false
        response_schema:
          "200": "{authenticated: boolean}"
      - method: POST
        path: /api/auth/delete-account
        description: Delete the current user account
        auth_required: true
        request_schema:
          body:
            userId: string
        response_schema:
          "200": "{ok: true}"
          "400": Missing userId
    depends_on: []

  - name: Threads
    description: Create and retrieve AI conversation threads
    files:
      - server/api/threads/index.post.ts
      - server/api/threads/index.get.ts
      - server/api/threads/[id].get.ts
    endpoints:
      - method: POST
        path: /api/threads
        description: Create a new conversation thread
        auth_required: false
        request_schema:
          headers:
            x-user-id: string (optional)
          body:
            title: string (optional)
        response_schema:
          "200": "{thread: Thread}"
          "500": Internal error
      - method: GET
        path: /api/threads
        description: List all threads for the authenticated user
        auth_required: true
        response_schema:
          "200": "{threads: Thread[]}"
      - method: GET
        path: /api/threads/:id
        description: Get a single thread with its messages
        auth_required: true
        response_schema:
          "200": "{thread: Thread, messages: Message[]}"
          "404": Thread not found
    depends_on:
      - Authentication

  - name: Messages / AI Chat
    description: Post messages to a thread and get AI responses (buffered JSON or SSE stream)
    files:
      - server/api/threads/[id]/messages.post.ts
    endpoints:
      - method: POST
        path: /api/threads/:id/messages
        description: Send a user message and receive an AI reply; supports ?stream=true for SSE
        auth_required: true
        request_schema:
          headers:
            x-user-id: string
          body:
            content: string
          query:
            stream: boolean (optional)
        response_schema:
          "200": "{message: Message, reply: Message}"
          "400": Missing content or thread id
          "401": User ID required
          "404": Thread not found
          "429": Rate limit exceeded
          "500": AI error
    depends_on:
      - Threads
      - Authentication

  - name: Workflows
    description: CRUD and execution of named AI workflows
    files:
      - server/api/workflows/index.get.ts
      - server/api/workflows/index.post.ts
      - server/api/workflows/[id].delete.ts
      - server/api/workflows/[id].patch.ts
      - server/api/workflows/[id]/run.post.ts
    endpoints:
      - method: GET
        path: /api/workflows
        description: List all workflows for the user
        auth_required: true
        response_schema:
          "200": "{workflows: Workflow[]}"
      - method: POST
        path: /api/workflows
        description: Create a new workflow
        auth_required: true
        request_schema:
          headers:
            x-user-id: string
          body:
            name: string
            description: string (optional)
            prompt: string (optional)
            steps: WorkflowStep[] (optional)
        response_schema:
          "200": "{workflow: Workflow}"
          "400": Validation error
          "401": User ID required
      - method: DELETE
        path: /api/workflows/:id
        description: Delete a workflow by id
        auth_required: true
        response_schema:
          "200": "{ok: true}"
          "401": User ID required
          "404": Workflow not found
      - method: PATCH
        path: /api/workflows/:id
        description: Update a workflow
        auth_required: true
        request_schema:
          body:
            name: string (optional)
            description: string (optional)
            prompt: string (optional)
        response_schema:
          "200": "{workflow: Workflow}"
          "401": User ID required
          "404": Workflow not found
      - method: POST
        path: /api/workflows/:id/run
        description: Execute a workflow by running its prompt through the AI
        auth_required: true
        response_schema:
          "200": "{result: string}"
          "401": User ID required
          "404": Workflow not found
    depends_on:
      - Authentication

  - name: Automations
    description: Create and manage AI automations with triggers (schedule, email, webhook, chain)
    files:
      - server/api/automations/index.get.ts
      - server/api/automations/index.post.ts
      - server/api/automations/[id].delete.ts
      - server/api/automations/[id]/toggle.post.ts
      - server/api/automations/[id]/logs.get.ts
      - server/api/automations/process.post.ts
    endpoints:
      - method: GET
        path: /api/automations
        description: List all automations for the user
        auth_required: true
        response_schema:
          "200": "{automations: Automation[]}"
      - method: POST
        path: /api/automations
        description: Create a new automation
        auth_required: true
        request_schema:
          headers:
            x-user-id: string
          body:
            name: string
            trigger: string (email_received|schedule|webhook|chain)
            instructions: string
            description: string (optional)
            triggerConfig: object (optional)
            parentAutomationId: string (optional)
            chainOn: string (optional)
            triggerCondition: string (optional)
        response_schema:
          "200": "{automation: Automation}"
          "400": Validation error
          "401": User ID required
      - method: DELETE
        path: /api/automations/:id
        description: Delete an automation
        auth_required: true
        response_schema:
          "200": "{ok: true}"
          "401": User ID required
          "404": Automation not found
      - method: POST
        path: /api/automations/:id/toggle
        description: Toggle automation active/inactive
        auth_required: true
        response_schema:
          "200": "{automation: Automation}"
      - method: GET
        path: /api/automations/:id/logs
        description: Get execution logs for an automation
        auth_required: true
        response_schema:
          "200": "{logs: AutomationLog[]}"
      - method: POST
        path: /api/automations/process
        description: Process due scheduled automations or manually trigger one by automationId
        auth_required: false
        request_schema:
          body:
            automationId: string (optional)
            context: string (optional)
        response_schema:
          "200": "{results: object[]}"
          "429": Rate limit exceeded
    depends_on:
      - Authentication

  - name: User Integrations
    description: Manage per-user third-party integration credentials (Notion, Slack, etc.)
    files:
      - server/api/user-integrations/index.get.ts
      - server/api/user-integrations/index.post.ts
      - server/api/user-integrations/[id].delete.ts
      - server/api/user-integrations/test.post.ts
    endpoints:
      - method: GET
        path: /api/user-integrations
        description: List user's connected integrations
        auth_required: true
        response_schema:
          "200": "{integrations: UserIntegration[]}"
      - method: POST
        path: /api/user-integrations
        description: Add a new integration credential
        auth_required: true
        request_schema:
          body:
            integration: string
            credentials: object
        response_schema:
          "200": "{integration: UserIntegration}"
          "400": Validation error
          "401": User ID required
      - method: DELETE
        path: /api/user-integrations/:id
        description: Remove an integration
        auth_required: true
        response_schema:
          "200": "{ok: true}"
      - method: POST
        path: /api/user-integrations/test
        description: Test if a saved integration credential is functional
        auth_required: true
        response_schema:
          "200": "{ok: boolean, message: string}"
    depends_on:
      - Authentication

  - name: Memory
    description: Store and retrieve AI memory entries per user
    files:
      - server/api/memory.get.ts
      - server/api/memory.post.ts
      - server/api/memory/[id].delete.ts
      - server/api/memory/[id].patch.ts
    endpoints:
      - method: GET
        path: /api/memory
        description: List memory entries for the user
        auth_required: true
        response_schema:
          "200": "{memories: Memory[]}"
      - method: POST
        path: /api/memory
        description: Create a new memory entry
        auth_required: true
        request_schema:
          body:
            content: string
            category: string (optional)
        response_schema:
          "200": "{memory: Memory}"
          "400": Validation error
      - method: DELETE
        path: /api/memory/:id
        description: Delete a memory entry
        auth_required: true
        response_schema:
          "200": "{ok: true}"
      - method: PATCH
        path: /api/memory/:id
        description: Update a memory entry
        auth_required: true
        request_schema:
          body:
            content: string (optional)
            category: string (optional)
        response_schema:
          "200": "{memory: Memory}"
    depends_on:
      - Authentication

  - name: Pending Actions
    description: Approve or cancel AI-initiated write actions that require user confirmation
    files:
      - server/api/actions/pending.get.ts
      - server/api/actions/[id]/confirm.post.ts
      - server/api/actions/[id]/cancel.post.ts
    endpoints:
      - method: GET
        path: /api/actions/pending
        description: List all pending actions awaiting confirmation
        auth_required: true
        response_schema:
          "200": "{actions: Action[]}"
      - method: POST
        path: /api/actions/:id/confirm
        description: Confirm and execute a pending action
        auth_required: true
        response_schema:
          "200": "{ok: true, result: string}"
      - method: POST
        path: /api/actions/:id/cancel
        description: Cancel a pending action
        auth_required: true
        response_schema:
          "200": "{ok: true}"
    depends_on:
      - Authentication
      - Messages / AI Chat

  - name: Model Status
    description: Report the current AI model provider status
    files:
      - server/api/model/status.get.ts
    endpoints:
      - method: GET
        path: /api/model/status
        description: Get active AI model provider and availability
        auth_required: false
        response_schema:
          "200": "{models: object, active: string}"
    depends_on: []

  - name: Audit Log
    description: Retrieve integration tool execution audit trail
    files:
      - server/api/audit.get.ts
    endpoints:
      - method: GET
        path: /api/audit
        description: List recent audit log entries
        auth_required: true
        response_schema:
          "200": "{logs: AuditLog[]}"
    depends_on:
      - Authentication

known_limitations:
  - issue: x-user-id header is caller-supplied with no JWT verification — any caller can impersonate any userId
    location: server/api/threads/index.post.ts, server/api/workflows/index.post.ts
    impact: Authorization relies on client honesty; no server-side token validation
  - issue: Session cookie is set but not validated in most protected endpoints (they check x-user-id header instead)
    location: server/api/auth/login.post.ts
    impact: Session cookie and x-user-id are decoupled; misuse possible
  - issue: Rate limiting is in-memory and resets on server restart
    location: server/lib/rate-limiter.ts
    impact: Distributed deployments or restarts reset rate limit counters
