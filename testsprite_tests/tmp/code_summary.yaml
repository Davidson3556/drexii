version: "2"
type: backend
tech_stack:
  - language: TypeScript
  - framework: Nuxt 4 (H3 server engine, Node.js)
  - database: PostgreSQL (via Drizzle ORM)
  - auth: InsForge SDK (@insforge/sdk)
  - ai: Anthropic Claude SDK, Google Generative AI SDK
  - other: nuxt-security, postgres driver, Pinia
features:
  - name: Authentication
    description: User login, logout, session check, and account deletion via InsForge SDK
    files:
      - server/api/auth/login.post.ts
      - server/api/auth/logout.post.ts
      - server/api/auth/check.get.ts
      - server/api/auth/delete-account.post.ts
    endpoints:
      - method: POST
        path: /api/auth/login
        description: Sign in with email and password via InsForge SDK
        auth_required: false
        request_schema:
          body:
            email: string
            password: string
        response_schema:
          "200": "{ ok: true, provider: 'insforge' }"
          "400": email and password are required
          "401": Invalid credentials
      - method: POST
        path: /api/auth/logout
        description: No-op stub — sign-out is handled client-side via InsForge SDK
        auth_required: false
        response_schema:
          "200": "{ success: true }"
      - method: GET
        path: /api/auth/check
        description: Returns current authenticated user via InsForge SDK getCurrentUser()
        auth_required: false
        response_schema:
          "200": "{ authenticated: boolean, provider: 'insforge', user: User | null }"
      - method: POST
        path: /api/auth/delete-account
        description: Permanently deletes user via InsForge admin API. Requires x-user-id header or body.userId.
        auth_required: true
        request_schema:
          headers:
            x-user-id: string (optional)
          body:
            userId: string (optional if header provided)
        response_schema:
          "200": "{ success: true, message: string }"
          "401": User ID is required
          "500": Failed to delete account
    depends_on: []

  - name: Chat Threads
    description: Create conversation threads and send AI messages. Prompt injection sanitization applied via sanitizeToolOutput.
    files:
      - server/api/threads/index.post.ts
      - server/api/threads/[id].get.ts
      - server/lib/sanitize.ts
    endpoints:
      - method: POST
        path: /api/threads
        description: Create a new conversation thread
        auth_required: false
        request_schema:
          body:
            title: string (optional)
        response_schema:
          "200": "{ thread: Thread }"
          "500": DATABASE_URL not set or DB error
      - method: GET
        path: /api/threads/:id
        description: Get a thread and its messages by ID
        auth_required: false
        response_schema:
          "200": "{ thread: Thread, messages: Message[] }"
          "404": Thread not found
      - method: POST
        path: /api/threads/:id/messages
        description: Post a message to a thread and receive AI reply
        auth_required: false
        request_schema:
          body:
            content: string
        response_schema:
          "200": "{ message: Message, reply: Message }"
          "400": Content required
          "500": Server error
    depends_on:
      - Prompt Injection Sanitizer

  - name: Prompt Injection Sanitizer
    description: Scans tool output for 9 injection patterns (ignore previous instructions, system:, [TOOL_CALL:, etc.) and replaces with [FILTERED]. Case-insensitive. Also wraps in XML via wrapToolContext.
    files:
      - server/lib/sanitize.ts
    endpoints: []
    depends_on: []

  - name: Automations
    description: Create, list, toggle, delete, and process automations. Supports triggers email_received, schedule, webhook, chain with optional chaining via evaluateChainCondition.
    files:
      - server/api/automations/index.post.ts
      - server/api/automations/index.get.ts
      - server/api/automations/[id].delete.ts
      - server/api/automations/[id]/toggle.post.ts
      - server/api/automations/[id]/logs.get.ts
      - server/api/automations/process.post.ts
      - server/lib/agent-runner.ts
    endpoints:
      - method: POST
        path: /api/automations
        description: Create a new automation. Requires x-user-id header.
        auth_required: true
        request_schema:
          headers:
            x-user-id: string
          body:
            name: string
            trigger: "email_received | schedule | webhook | chain"
            instructions: string
            description: string (optional)
            triggerConfig: object (optional)
            parentAutomationId: string (optional)
            chainOn: "always | success | failure (optional, default 'success')"
            triggerCondition: string (optional)
        response_schema:
          "200": "{ automation: Automation }"
          "400": Validation error
          "401": User ID required
      - method: GET
        path: /api/automations
        description: List automations for a user
        auth_required: true
        response_schema:
          "200": "{ automations: Automation[] }"
      - method: POST
        path: /api/automations/process
        description: Process due scheduled automations, or manually trigger one by automationId
        auth_required: false
        request_schema:
          body:
            automationId: string (optional)
            context: string (optional)
        response_schema:
          "200": "{ ok: true, processed: number }"
      - method: POST
        path: /api/automations/:id/toggle
        description: Enable or disable an automation
        auth_required: false
        response_schema:
          "200": "{ automation: Automation }"
      - method: DELETE
        path: /api/automations/:id
        description: Delete an automation by ID
        auth_required: false
        response_schema:
          "200": "{ ok: true }"
    depends_on:
      - Chain Condition Evaluator

  - name: Chain Condition Evaluator
    description: Evaluates plain-English automation chain conditions. null/always=true, success=true if status=success, failure/error=true if status=error, 'output contains X'=true if output includes X (case-insensitive). Unknown conditions default to true.
    files:
      - server/lib/agent-runner.ts
    endpoints: []
    depends_on: []

  - name: Workflows
    description: Create, list, run, and delete multi-step agent workflows. Accepts name+prompt or name+steps[] (steps converted to prompt string).
    files:
      - server/api/workflows/index.post.ts
      - server/api/workflows/index.get.ts
      - server/api/workflows/[id].delete.ts
      - server/api/workflows/[id]/run.post.ts
    endpoints:
      - method: POST
        path: /api/workflows
        description: Create a new workflow. Accepts prompt string or steps array.
        auth_required: false
        request_schema:
          body:
            name: string
            description: string (optional)
            prompt: string (optional if steps provided)
            steps: "WorkflowStep[] (optional if prompt provided) — { title?, description?, instruction? }"
        response_schema:
          "200": "{ workflow: Workflow }"
          "400": name and prompt (or steps) are required
          "500": Database error
      - method: GET
        path: /api/workflows
        description: List all workflows
        auth_required: false
        response_schema:
          "200": "{ workflows: Workflow[] }"
      - method: POST
        path: /api/workflows/:id/run
        description: Run a workflow by ID
        auth_required: false
        response_schema:
          "200": "{ result: string }"
      - method: DELETE
        path: /api/workflows/:id
        description: Delete a workflow
        auth_required: false
        response_schema:
          "200": "{ ok: true }"
    depends_on:
      - Tool Call Parser

  - name: Tool Call Parser
    description: "Parses [TOOL_CALL: toolName({\"key\":\"value\"})] from AI text. Primary JSON parser with fallback key:value splitter. Handles multiple calls, embedded text, and malformed JSON without throwing."
    files:
      - server/lib/utils/parse-tool-calls.ts
    endpoints: []
    depends_on: []

  - name: Memory Management
    description: Create, retrieve, update, and delete persistent AI memory entries. Categories are fact, preference, context. formatMemoriesForPrompt wraps memories in <memory_context> XML.
    files:
      - server/api/memory.post.ts
      - server/api/memory.get.ts
      - server/api/memory/[id].patch.ts
      - server/api/memory/[id].delete.ts
      - server/lib/memory.ts
    endpoints:
      - method: POST
        path: /api/memory
        description: Create a new memory entry. Returns full entry including id.
        auth_required: false
        request_schema:
          headers:
            x-user-id: string (optional)
          body:
            content: string
            category: "fact | preference | context (optional, default 'fact')"
            source: string (optional)
        response_schema:
          "200": "{ ok: true, id: string, category: string, content: string, createdAt: string }"
          "400": content is required
          "500": Failed to save memory
      - method: GET
        path: /api/memory
        description: List recent memories or search by ?q=query
        auth_required: false
        response_schema:
          "200": "{ memories: Memory[], count: number }"
      - method: PATCH
        path: /api/memory/:id
        description: Update a memory entry by ID
        auth_required: false
        request_schema:
          body:
            content: string (optional)
            category: string (optional)
        response_schema:
          "200": "{ ok: true, memory: Memory }"
      - method: DELETE
        path: /api/memory/:id
        description: Delete a memory entry by ID
        auth_required: false
        response_schema:
          "200": "{ ok: true }"
    depends_on:
      - Memory Prompt Formatter

  - name: Memory Prompt Formatter
    description: Formats memory entries as "- [category] content" lines wrapped in <memory_context> XML tags for AI prompts. Empty array returns empty string.
    files:
      - server/lib/memory.ts
    endpoints: []
    depends_on: []

  - name: User Integrations
    description: Manage user integration credentials for Gmail, Slack, Notion, Jira, Linear, Asana, Google Calendar, Google Drive, Discord, Zendesk. Credentials masked in list responses.
    files:
      - server/api/user-integrations/index.get.ts
      - server/api/user-integrations/index.post.ts
      - server/api/user-integrations/test.post.ts
      - server/api/user-integrations/[id].delete.ts
    endpoints:
      - method: GET
        path: /api/user-integrations
        description: List all integrations for a user with masked credentials. Requires x-user-id header.
        auth_required: true
        request_schema:
          headers:
            x-user-id: string
        response_schema:
          "200": "UserIntegration[] (credentials masked)"
          "401": User ID required
      - method: POST
        path: /api/user-integrations
        description: Add or update an integration for a user. Upserts on (userId, integration). Requires x-user-id header.
        auth_required: true
        request_schema:
          headers:
            x-user-id: string
          body:
            integration: "slack | notion | discord | zendesk | gmail | google_calendar | google_drive | jira | linear"
            credentials: object
        response_schema:
          "200": "{ id: string, integration: string, status: 'created' | 'updated' }"
          "400": Validation error
          "401": User ID required
      - method: POST
        path: /api/user-integrations/test
        description: Test an integration connection using provided credentials
        auth_required: false
        request_schema:
          body:
            integration: string
            credentials: object
        response_schema:
          "200": "{ success: boolean, error: string | null }"
      - method: DELETE
        path: /api/user-integrations/:id
        description: Remove a user integration by ID
        auth_required: false
        response_schema:
          "200": "{ ok: true }"
    depends_on: []

  - name: Confirm-Before-Act Safety Layer
    description: Potentially destructive AI-triggered actions are queued as pending and require explicit user confirmation or cancellation before execution.
    files:
      - server/api/actions/pending.get.ts
      - server/api/actions/[id]/confirm.post.ts
      - server/api/actions/[id]/cancel.post.ts
      - server/lib/actions.ts
    endpoints:
      - method: GET
        path: /api/actions/pending
        description: List all pending actions awaiting user approval
        auth_required: false
        response_schema:
          "200": "{ actions: PendingAction[] }"
          "500": Server error
      - method: POST
        path: /api/actions/:id/confirm
        description: Confirm and execute a pending action
        auth_required: false
        response_schema:
          "200": "{ ok: true, result: unknown }"
      - method: POST
        path: /api/actions/:id/cancel
        description: Cancel and discard a pending action
        auth_required: false
        response_schema:
          "200": "{ ok: true }"
    depends_on: []

  - name: AI Model Status
    description: Check the current status and availability of configured AI models
    files:
      - server/api/model/status.get.ts
    endpoints:
      - method: GET
        path: /api/model/status
        description: Return status of configured AI providers (Claude, DeepSeek, Gemini)
        auth_required: false
        response_schema:
          "200": "{ models: ModelStatus[] }"
    depends_on: []

  - name: Audit Log
    description: Retrieve an audit trail of agent actions and system events
    files:
      - server/api/audit.get.ts
    endpoints:
      - method: GET
        path: /api/audit
        description: List audit log entries
        auth_required: false
        response_schema:
          "200": "{ entries: AuditEntry[] }"
    depends_on: []

  - name: Gmail Webhook
    description: Receive Gmail push notifications to trigger email_received automations
    files:
      - server/api/webhooks/gmail.post.ts
    endpoints:
      - method: POST
        path: /api/webhooks/gmail
        description: Handle incoming Gmail push notification or poll=true
        auth_required: false
        request_schema:
          body:
            message: object (optional)
            subscription: string (optional)
            poll: boolean (optional)
            userId: string (optional)
        response_schema:
          "200": "{ success: true }"
    depends_on:
      - Automations

known_limitations:
  - issue: Login endpoint requires a real test user provisioned in InsForge for integration tests
    location: server/api/auth/login.post.ts
    impact: Test will fail if no matching account exists in the InsForge project — code is correct
  - issue: GET /api/auth/check uses server-side InsForge.getCurrentUser() which reads session from cookie
    location: server/api/auth/check.get.ts
    impact: Returns authenticated=false in stateless test environments with no session cookie
  - issue: DELETE /api/auth/delete-account requires INSFORGE_API_KEY (admin key) in env
    location: server/api/auth/delete-account.post.ts
    impact: Returns 500 if admin key is absent — not a code bug, config issue
  - issue: Chain condition evaluation uses simple string matching — unknown conditions now safely return false
    location: server/lib/agent-runner.ts
    impact: Unrecognized conditions skip the chain with a warning log (fixed in Round 2)
